<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PlantUML High Clarity Export</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .umlLayout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .umlEditor {
        min-height: 520px;
        width: 100%;
        resize: vertical;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px;
        background: rgba(0, 0, 0, 0.26);
        color: var(--text);
        font-family: var(--mono);
        line-height: 1.4;
      }
      .umlPreview {
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 520px;
        background: rgba(0, 0, 0, 0.14);
        overflow: auto;
      }
      .umlPreview img {
        display: block;
        margin: 0 auto;
        max-width: none;
      }
      .umlActions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .umlScale {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .umlScale input {
        width: 88px;
        padding: 9px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        color: var(--text);
      }
      @media (max-width: 980px) {
        .umlLayout {
          grid-template-columns: 1fr;
        }
      }

      .statusDetails {
        margin-top: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--mono);
        color: rgba(230, 237, 246, 0.92);
        background: rgba(255, 93, 143, 0.08);
        border: 1px solid rgba(255, 93, 143, 0.25);
        padding: 10px 12px;
        border-radius: 10px;
        max-height: 220px;
        overflow: auto;
      }

      .umlErrorBox {
        padding: 18px;
        color: rgba(230, 237, 246, 0.95);
      }

      .umlErrorBox__title {
        font-weight: 700;
        margin-bottom: 10px;
      }

      .umlErrorBox__pre {
        font-family: var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(255, 93, 143, 0.08);
        border: 1px solid rgba(255, 93, 143, 0.25);
        padding: 10px 12px;
        border-radius: 10px;
        margin: 0;
        max-height: 520px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__title">PlantUML High Clarity Export</div>
        <div class="topbar__actions">
          <a class="btn" href="./index.html">Back to menu</a>
          <a class="btn" href="./packer.html">Open packer</a>
        </div>
      </header>

      <main class="main" style="grid-template-columns: 1fr">
        <section class="panel">
          <div class="panel__title">Editor and Preview</div>
          <div class="umlActions" style="margin-bottom: 10px">
            <button id="renderBtn" class="btn btn--primary" type="button">
              Render
            </button>
            <button id="svgBtn" class="btn" type="button">Export SVG</button>
            <button id="pngBtn" class="btn" type="button">Export PNG</button>
            <button id="folderBtn" class="btn" type="button">
              Select Download Folder
            </button>
            <label class="umlScale">
              <span class="setting__label">File name</span>
              <input id="fileName" type="text" value="diagram" />
            </label>
            <label class="umlScale">
              <span class="setting__label">PNG scale</span>
              <input
                id="pngScale"
                type="number"
                min="1"
                max="16"
                step="1"
                value="4"
              />
            </label>
          </div>
          <div class="umlLayout">
            <textarea id="umlInput" class="umlEditor" spellcheck="false">
@startuml
title Authentication flow
actor User
participant "Web App" as WA
participant "API" as API
database DB

User -> WA: Submit login form
WA -> API: POST /login
API -> DB: validate credentials
DB --> API: valid user
API --> WA: JWT token
WA --> User: Login success
@enduml</textarea
            >
            <div id="preview" class="umlPreview"></div>
          </div>
          <div class="panel__footer">
            <div id="status" class="status">
              Tip: SVG export is always the sharpest. PNG export uses your
              selected scale.
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder@1.4.0/dist/plantuml-encoder.min.js"></script>
    <script>
      const SERVER = "https://www.plantuml.com/plantuml";
      const renderBtn = document.getElementById("renderBtn");
      const svgBtn = document.getElementById("svgBtn");
      const pngBtn = document.getElementById("pngBtn");
      const folderBtn = document.getElementById("folderBtn");
      const fileName = document.getElementById("fileName");
      const pngScale = document.getElementById("pngScale");
      const umlInput = document.getElementById("umlInput");
      const preview = document.getElementById("preview");
      const status = document.getElementById("status");
      let downloadDirHandle = null;

      function setStatus(summary, details) {
        status.innerHTML = "";
        const summaryEl = document.createElement("div");
        summaryEl.textContent = summary;
        status.appendChild(summaryEl);

        if (details) {
          const pre = document.createElement("pre");
          pre.className = "statusDetails";
          pre.textContent = details;
          status.appendChild(pre);
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function safeSlice(text, maxChars) {
        const s = String(text ?? "");
        if (s.length <= maxChars) return s;
        return s.slice(0, maxChars) + "\n...[truncated]";
      }

      function stripHtmlToText(html) {
        const raw = String(html ?? "");
        if (!raw.trim()) return "";
        try {
          const doc = new DOMParser().parseFromString(raw, "text/html");
          const t =
            doc.body?.innerText ||
            doc.documentElement?.textContent ||
            "";
          return t.replace(/\s+/g, " ").trim();
        } catch {
          return raw
            .replace(/<[^>]+>/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        }
      }

      /** PlantUML returns HTTP 4xx with an SVG "error diagram"; pull readable lines from <text> nodes. */
      function extractPlantUmlErrorSummaryFromSvg(svgText) {
        const raw = String(svgText ?? "");
        if (!/<svg\b/i.test(raw)) return "";

        let doc;
        try {
          doc = new DOMParser().parseFromString(raw, "image/svg+xml");
          const pe = doc.querySelector("parsererror");
          if (pe && pe.textContent?.trim()) {
            return pe.textContent.trim().slice(0, 800);
          }
        } catch {
          return "";
        }

        const textEls = Array.from(doc.querySelectorAll("text"));
        const texts = textEls
          .map((el) => (el.textContent || "").replace(/\s+/g, " ").trim())
          .filter((t) => t && t !== "\u00a0");

        const blob = texts.join(" ");

        const patterns = [
          /syntax error[^\n.]{0,500}/i,
          /Syntax Error[^\n.]{0,500}/i,
          /cannot find[^\n.]{0,400}/i,
          /Unexpected [^\n.]{0,400}/i,
          /Expecting [^\n.]{0,400}/i,
          /Invalid [^\n.]{0,400}/i,
          /It seems that you[^\n]{0,500}/i,
          /No diagram found[^\n.]{0,400}/i,
          /\[From string \(line \d+\)[^\]]*\][^.]{0,600}/i,
        ];
        for (const re of patterns) {
          const m = blob.match(re);
          if (m) return m[0].trim().slice(0, 900);
        }

        const redTexts = textEls
          .filter((el) => {
            const fill = (el.getAttribute("fill") || "").toLowerCase();
            return (
              fill === "#ff0000" ||
              fill === "#f00" ||
              fill === "red" ||
              /^#f{1,2}0{4,6}$/i.test(fill)
            );
          })
          .map((el) => el.textContent.trim())
          .filter(Boolean);
        if (redTexts.length) {
          return redTexts.join(" — ").slice(0, 900);
        }

        const lineRef = blob.match(/\[From string \(line (\d+)\)\s*\]/i);
        if (lineRef) {
          const n = lineRef[1];
          const idx = texts.findIndex((t) =>
            /\[From string \(line \d+\)/i.test(t),
          );
          if (idx >= 0) {
            const tail = texts.slice(idx, idx + 12).join(" | ");
            return `Source line ${n}. ${tail.slice(0, 850)}${tail.length > 850 ? "…" : ""}`;
          }
          return `PlantUML points to source line ${n} (see preview diagram).`;
        }

        return blob.replace(/\s+/g, " ").trim().slice(0, 700);
      }

      function httpStatusLabel(status, statusText) {
        const st = String(statusText ?? "").trim();
        if (st) return st;
        const fb = {
          400: "Bad Request",
          401: "Unauthorized",
          403: "Forbidden",
          404: "Not Found",
          429: "Too Many Requests",
          500: "Internal Server Error",
          502: "Bad Gateway",
          503: "Service Unavailable",
        };
        return fb[status] || "";
      }

      function shortenUrlForDisplay(url) {
        const s = String(url ?? "");
        if (s.length <= 120) return s;
        try {
          const u = new URL(s);
          const enc = u.pathname.split("/").pop() || "";
          const head = `${u.origin}${u.pathname.slice(0, u.pathname.lastIndexOf("/") + 1)}`;
          return `${head}${enc.slice(0, 40)}…${enc.length > 40 ? ` (${enc.length} chars)` : ""}`;
        } catch {
          return s.slice(0, 120) + "…";
        }
      }

      function responseLooksLikeHtml(text) {
        const s = String(text ?? "").trimStart().slice(0, 400).toLowerCase();
        return (
          s.startsWith("<!doctype") ||
          s.startsWith("<html") ||
          (s.startsWith("<") && /<\/(html|body|head)\b/i.test(String(text ?? "")))
        );
      }

      /** Plain-text summary for previews, HTTP bodies, and non-SVG responses. */
      function humanizeErrorPayload(text) {
        const raw = String(text ?? "");
        if (!raw.trim()) return "";
        if (/<svg\b/i.test(raw)) {
          const s = extractPlantUmlErrorSummaryFromSvg(raw);
          return s || "(SVG response — could not extract a short summary)";
        }
        if (responseLooksLikeHtml(raw)) {
          const plain = stripHtmlToText(raw);
          return plain || "(HTML response with no extractable text)";
        }
        return raw.trim();
      }

      function sameUnderlyingErrorMessage(a, b) {
        let x = String(a ?? "").trim().replace(/\s+/g, " ");
        let y = String(b ?? "").trim().replace(/\s+/g, " ");
        for (let i = 0; i < 3; i++) {
          const nx = x.replace(/^Error:\s*/i, "").trim();
          const ny = y.replace(/^Error:\s*/i, "").trim();
          if (nx === x && ny === y) break;
          x = nx;
          y = ny;
        }
        return x === y;
      }

      function stringifyErrorDetails(err) {
        if (err == null) return "Unknown error (null/undefined).";
        if (typeof err === "string") return err;

        if (err instanceof Error) {
          const parts = [];
          parts.push(`Name: ${err.name || "Error"}`);
          parts.push(`Message: ${err.message || "(empty message)"}`);
          if (err.url) parts.push(`URL: ${shortenUrlForDisplay(err.url)}`);
          if (err.http) {
            const { status, statusText, body } = err.http;
            parts.push(`HTTP: ${status} ${statusText || ""}`.trim());
            if (body) {
              const plain = humanizeErrorPayload(body);
              parts.push(`HTTP body:\n${safeSlice(plain, 4000)}`);
            }
          }
          if (err.snippet) {
            const sn = humanizeErrorPayload(err.snippet);
            parts.push(`Response snippet:\n${safeSlice(sn, 2000)}`);
          }
          if (err.stack) parts.push(`Stack:\n${err.stack}`);
          if (err.cause) {
            const c = err.cause;
            const dup =
              c instanceof Error &&
              sameUnderlyingErrorMessage(c.message, err.message);
            if (!dup) {
              parts.push(`Cause:\n${stringifyErrorDetails(err.cause)}`);
            }
          }
          return parts.join("\n");
        }

        try {
          return `Thrown value: ${JSON.stringify(err, null, 2)}`;
        } catch {
          return `Thrown value (unserializable): ${String(err)}`;
        }
      }

      function getEncodedDiagram() {
        const source = String(umlInput.value || "").trim();
        if (!source) {
          throw new Error(
            "PlantUML text is empty. Paste a diagram that includes @startuml ... @enduml.",
          );
        }

        if (!window.plantumlEncoder || !window.plantumlEncoder.encode) {
          throw new Error(
            "PlantUML encoder failed to load (plantuml-encoder). Check network connectivity to cdn.jsdelivr.net.",
          );
        }

        const hasStart = /^\s*@startuml\b/im.test(source);
        const hasEnd = /^\s*@enduml\b/im.test(source);
        if (!hasStart || !hasEnd) {
          throw new Error("Diagram must include @startuml and @enduml.");
        }

        // Force a consistent export font across render/SVG/PNG.
        // "bold" is used as a practical semibold-like fallback in PlantUML.
        const fontBlock =
          "\n' injected by local exporter\n" +
          "skinparam defaultFontName Montserrat\n" +
          "skinparam defaultFontStyle bold\n";

        const injected = source.replace(
          /^\s*@startuml\b/i,
          (m) => `${m}${fontBlock}`,
        );
        try {
          return window.plantumlEncoder.encode(injected);
        } catch (e) {
          const err = new Error("Failed to encode PlantUML.");
          err.cause = e;
          throw err;
        }
      }

      function getSvgUrl(encoded) {
        return `${SERVER}/svg/${encoded}`;
      }

      function getPngUrl(encoded) {
        return `${SERVER}/png/${encoded}`;
      }

      /**
       * PlantUML often returns HTTP 400 with a valid SVG error diagram (not plain text).
       * Treat that as a successful fetch so the preview can show the diagram.
       */
      async function fetchPlantUmlSvg(url) {
        let r;
        try {
          r = await fetch(url);
        } catch (e) {
          const err = new Error(
            `Network request failed while fetching PlantUML (${shortenUrlForDisplay(url)}).`,
          );
          err.cause = e;
          err.url = url;
          throw err;
        }

        const text = await r.text();

        if (r.ok) {
          return { text, httpStatus: r.status, plantumlErrorSvg: false };
        }

        if (/<svg\b/i.test(text)) {
          return { text, httpStatus: r.status, plantumlErrorSvg: true };
        }

        const label = httpStatusLabel(r.status, r.statusText);
        const hint = humanizeErrorPayload(text) || "Empty response body.";
        const err = new Error(
          `PlantUML request failed (HTTP ${r.status}${label ? " " + label : ""}). ${hint}`,
        );
        err.url = url;
        err.http = {
          status: r.status,
          statusText: r.statusText || "",
          body: text,
        };
        throw err;
      }

      function downloadBlob(blob, filename) {
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(u), 8000);
      }

      async function saveBlobToSelectedFolder(blob, filename) {
        if (!downloadDirHandle) return false;
        const fileHandle = await downloadDirHandle.getFileHandle(filename, {
          create: true,
        });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        return true;
      }

      function safeBaseFileName() {
        const raw = String(fileName.value || "").trim();
        const cleaned = raw
          .replace(/[<>:"/\\|?*\x00-\x1f]/g, "-")
          .replace(/\.+$/g, "")
          .trim();
        const base = cleaned || "diagram";
        fileName.value = base;
        return base;
      }

      function assertLooksLikeSvg(svgText, context) {
        if (!/<svg\b/i.test(svgText)) {
          const plain = humanizeErrorPayload(svgText);
          const hint = plain
            ? plain.slice(0, 800) + (plain.length > 800 ? "…" : "")
            : "The server response was not a valid SVG diagram.";
          const err = new Error(
            `PlantUML did not return a diagram${context ? " (" + context + ")" : ""}. ${hint}`,
          );
          err.snippet = plain || safeSlice(svgText, 500);
          throw err;
        }
      }

      function renderErrorInPreview(err) {
        const details = stringifyErrorDetails(err);
        const safe = escapeHtml(details);
        preview.innerHTML = `
          <div class="umlErrorBox">
            <div class="umlErrorBox__title">Error</div>
            <pre class="umlErrorBox__pre">${safe}</pre>
          </div>
        `;
      }

      async function renderPreview() {
        try {
          const encoded = getEncodedDiagram();
          const svgUrl = getSvgUrl(encoded);
          const { text: svgText, httpStatus, plantumlErrorSvg } =
            await fetchPlantUmlSvg(svgUrl);
          assertLooksLikeSvg(svgText, "during preview render");
          preview.innerHTML = svgText;
          if (plantumlErrorSvg) {
            const summary = extractPlantUmlErrorSummaryFromSvg(svgText);
            setStatus(
              `PlantUML error (HTTP ${httpStatus}). ${summary || "See the preview diagram for the full message."}`,
            );
          } else {
            setStatus("Rendered successfully.");
          }
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `Render failed: ${e.message}`
              : `Render failed.`;
          setStatus(summary, details);
        }
      }

      async function exportSvg() {
        try {
          const encoded = getEncodedDiagram();
          const { text: svgText, httpStatus, plantumlErrorSvg } =
            await fetchPlantUmlSvg(getSvgUrl(encoded));
          assertLooksLikeSvg(svgText, "during SVG export");
          const svgBlob = new Blob([svgText], {
            type: "image/svg+xml;charset=utf-8",
          });
          const base = safeBaseFileName();
          const filename = `${base}.svg`;
          const saved = await saveBlobToSelectedFolder(svgBlob, filename);
          const errNote = plantumlErrorSvg
            ? ` — PlantUML returned an error diagram (HTTP ${httpStatus})`
            : "";
          if (saved) {
            setStatus(`SVG saved to selected folder as ${filename}.${errNote}`);
          } else {
            downloadBlob(svgBlob, filename);
            setStatus(`SVG downloaded (vector, best clarity).${errNote}`);
          }
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `SVG export failed: ${e.message}`
              : `SVG export failed.`;
          setStatus(summary, details);
        }
      }

      async function exportPng() {
        try {
          const encoded = getEncodedDiagram();
          const base = safeBaseFileName();
          const scale = Math.max(1, Math.min(16, Number(pngScale.value) || 4));
          pngScale.value = String(scale);

          const { text: svgText, plantumlErrorSvg, httpStatus } =
            await fetchPlantUmlSvg(getSvgUrl(encoded));
          assertLooksLikeSvg(svgText, "during PNG export");
          const svgBlob = new Blob([svgText], {
            type: "image/svg+xml;charset=utf-8",
          });
          const svgUrl = URL.createObjectURL(svgBlob);
          const img = new Image();

          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = (evt) => {
              const err = new Error(
                "Failed to rasterize SVG to PNG (image load error).",
              );
              err.snippet =
                extractPlantUmlErrorSummaryFromSvg(svgText) ||
                safeSlice(svgText, 800);
              err.cause = evt;
              reject(err);
            };
            img.src = svgUrl;
          });

          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          if (!ctx) throw new Error("Canvas is not available.");

          ctx.setTransform(scale, 0, 0, scale, 0, 0);
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(svgUrl);

          const blob = await new Promise((resolve) =>
            canvas.toBlob(resolve, "image/png"),
          );
          if (!blob) throw new Error("Could not create PNG.");
          const filename = `${base}.png`;
          const saved = await saveBlobToSelectedFolder(blob, filename);
          const errNote = plantumlErrorSvg
            ? ` — PlantUML returned an error diagram (HTTP ${httpStatus})`
            : "";
          if (saved) {
            setStatus(
              `PNG saved to selected folder as ${filename} (${scale}x).${errNote}`,
            );
          } else {
            downloadBlob(blob, filename);
            setStatus(`PNG downloaded at ${scale}x scale.${errNote}`);
          }
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `PNG export failed: ${e.message}`
              : `PNG export failed.`;
          setStatus(summary, details);
        }
      }

      renderBtn.addEventListener("click", renderPreview);
      svgBtn.addEventListener("click", exportSvg);
      pngBtn.addEventListener("click", exportPng);
      folderBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            setStatus(
              "Folder picker unavailable in an insecure context.",
              "This feature requires a secure context. Use https:// or run on localhost (not a plain file:// path).",
            );
            return;
          }
          if (!window.showDirectoryPicker) {
            setStatus(
              "Folder picker is not supported in this browser.",
              "Use a Chromium-based browser (Microsoft Edge / Google Chrome). If you can't, exports will still download normally without choosing a folder.",
            );
            return;
          }
          downloadDirHandle = await window.showDirectoryPicker({
            mode: "readwrite",
          });
          const folderName =
            downloadDirHandle && downloadDirHandle.name
              ? downloadDirHandle.name
              : "selected folder";
          setStatus(`Download folder selected: ${folderName}`);
        } catch (e) {
          if (e && e.name === "AbortError") {
            setStatus("Folder selection canceled.");
            return;
          }
          console.error(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `Folder selection failed: ${e.message}`
              : `Folder selection failed.`;
          setStatus(summary, details);
        }
      });

      // Ctrl/Cmd + Enter for quick render.
      umlInput.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          renderPreview();
        }
      });

      renderPreview();
    </script>
  </body>
</html>
