<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Code Snippet Maker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__left">
          <a class="brand" href="./index.html" aria-label="ASG home">ASG</a>
          <div class="topbar__title">Code Snippet Maker</div>
        </div>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="./index.html">Menu</a>
        </div>
      </header>

      <main class="main main--even">
        <section class="panel">
          <div class="panel__title">Input</div>
          <div class="snippetToolbar">
            <label class="snippetField">
              <span class="snippetLabel">File name</span>
              <input id="fileName" type="text" value="snippet" />
            </label>
            <label class="snippetField">
              <span class="snippetLabel">Font size (px)</span>
              <input
                id="fontSize"
                type="number"
                min="9"
                max="40"
                step="1"
                value="14"
              />
            </label>
            <label class="snippetField">
              <span class="snippetLabel">Wrap mode</span>
              <select id="wrapMode">
                <option value="off">No wrap</option>
                <option value="soft">Wrap lines</option>
                <option value="a4">Wrap to A4 width</option>
              </select>
            </label>
            <label class="snippetField">
              <span class="snippetLabel">PNG scale</span>
              <input
                id="pngScale"
                type="number"
                min="1"
                max="16"
                step="1"
                value="4"
              />
            </label>
            <label class="snippetField snippetField--check">
              <input id="splitA4" type="checkbox" />
              <span class="snippetLabel">Split by A4 height</span>
            </label>
            <button id="renderBtn" class="btn" type="button">Render</button>
            <button id="downloadBtn" class="btn btn--primary" type="button">
              Export PNG
            </button>
          </div>
          <textarea id="codeInput" class="snippetEditor" spellcheck="false">
#include &lt;stdio.h&gt;

// this is a comment
int main() {
  printf("Hello\n");
  /* block comment */
  return 0;
}</textarea
          >
        </section>

        <section class="panel">
          <div class="panel__title">Preview</div>
          <div class="snippetPreviewWrap">
            <div id="capture" class="snippetCapture">
              <pre id="previewCode"></pre>
            </div>
          </div>
          <div class="panel__footer">
            <div id="status" class="status">
              Monochrome snippet: black text, gray comments. Use PNG scale for
              export sharpness (same idea as diagram tools).
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
      const codeInput = document.getElementById("codeInput");
      const previewCode = document.getElementById("previewCode");
      const capture = document.getElementById("capture");
      const renderBtn = document.getElementById("renderBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const fileName = document.getElementById("fileName");
      const pngScale = document.getElementById("pngScale");
      const fontSize = document.getElementById("fontSize");
      const wrapMode = document.getElementById("wrapMode");
      const splitA4 = document.getElementById("splitA4");
      const status = document.getElementById("status");

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function highlightComments(line) {
        const blockIdx = line.indexOf("/*");
        const slashIdx = line.indexOf("//");
        let commentStart = -1;
        if (blockIdx >= 0 && slashIdx >= 0)
          commentStart = Math.min(blockIdx, slashIdx);
        else commentStart = Math.max(blockIdx, slashIdx);
        if (commentStart < 0) return esc(line);
        const before = esc(line.slice(0, commentStart));
        const comment = esc(line.slice(commentStart));
        return `${before}<span class="comment">${comment}</span>`;
      }

      function safeBaseFileName() {
        const raw = String(fileName.value || "").trim();
        const cleaned = raw
          .replace(/[<>:"/\\|?*\x00-\x1f]/g, "-")
          .replace(/\.+$/g, "")
          .trim();
        const base = cleaned || "snippet";
        fileName.value = base;
        return base;
      }

      function triggerDownload(dataUrl, filename) {
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      function render() {
        const code = String(codeInput.value || "");
        const px = Math.max(9, Math.min(40, Number(fontSize.value) || 14));
        const mode = ["off", "soft", "a4"].includes(wrapMode.value)
          ? wrapMode.value
          : "off";
        const useWrap = mode !== "off";
        const useA4Wrap = mode === "a4";
        fontSize.value = String(px);
        codeInput.style.fontSize = `${px}px`;
        previewCode.style.fontSize = `${px}px`;
        capture.classList.toggle("is-wrap", useWrap);
        capture.classList.toggle("is-a4-wrap", useA4Wrap);
        const lines = code.split("\n");
        previewCode.innerHTML = lines
          .map(
            (line) =>
              `<span class="snippetLine">${highlightComments(line)}</span>`
          )
          .join("");
        status.textContent = `Rendered (${px}px, ${mode === "a4" ? "A4 wrap" : mode === "soft" ? "wrap" : "no wrap"}).`;
      }

      function getMeasureRoot() {
        let root = document.getElementById("snippetMeasureRoot");
        if (!root) {
          root = document.createElement("div");
          root.id = "snippetMeasureRoot";
          root.setAttribute("aria-hidden", "true");
          root.style.cssText =
            "position:fixed;left:-10000px;top:0;visibility:hidden;pointer-events:none;";
          document.body.appendChild(root);
        }
        return root;
      }

      function syncMeasureCapture() {
        const root = getMeasureRoot();
        root.innerHTML = "";
        const clone = capture.cloneNode(false);
        clone.removeAttribute("id");
        clone.className = capture.className;
        clone.style.width = `${capture.offsetWidth}px`;
        clone.style.boxSizing = "border-box";
        const pre = document.createElement("pre");
        pre.className = previewCode.className;
        if (previewCode.style.fontSize) {
          pre.style.fontSize = previewCode.style.fontSize;
        }
        clone.appendChild(pre);
        root.appendChild(clone);
        return pre;
      }

      function measureSliceHeight(text) {
        const pre = syncMeasureCapture();
        pre.innerHTML = `<span class="snippetLine">${highlightComments(text)}</span>`;
        const span = pre.querySelector(".snippetLine");
        return span ? span.offsetHeight : 0;
      }

      function splitLongLine(lineStr, budgetPx) {
        const chunks = [];
        let start = 0;
        while (start < lineStr.length) {
          let low = start + 1;
          let high = lineStr.length;
          let fitEnd = start;
          while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            const h = measureSliceHeight(lineStr.slice(start, mid));
            if (h <= budgetPx) {
              fitEnd = mid;
              low = mid + 1;
            } else {
              high = mid - 1;
            }
          }
          if (fitEnd === start) {
            fitEnd = start + 1;
          }
          chunks.push([start, fitEnd]);
          start = fitEnd;
        }
        return chunks;
      }

      function spanBandInPre(span) {
        const pr = previewCode.getBoundingClientRect();
        const r = span.getBoundingClientRect();
        return { top: r.top - pr.top, bottom: r.bottom - pr.top };
      }

      function buildSplitTasks(spans, sourceLines, budgetPx) {
        const tasks = [];
        let i = 0;
        const n = spans.length;
        while (i < n) {
          if (spans[i].offsetHeight > budgetPx + 0.5) {
            for (const [a, b] of splitLongLine(sourceLines[i], budgetPx)) {
              tasks.push([{ line: i, from: a, to: b }]);
            }
            i += 1;
            continue;
          }
          const pageTop = spanBandInPre(spans[i]).top;
          let j = i;
          while (j < n) {
            if (spans[j].offsetHeight > budgetPx + 0.5) {
              break;
            }
            const band = spanBandInPre(spans[j]);
            if (band.bottom - pageTop > budgetPx + 0.5) {
              break;
            }
            j += 1;
          }
          if (j === i) {
            j = i + 1;
          }
          const parts = [];
          for (let k = i; k < j; k += 1) {
            parts.push({ line: k });
          }
          tasks.push(parts);
          i = j;
        }
        return tasks;
      }

      function htmlForParts(parts, sourceLines) {
        return parts
          .map((p) => {
            const raw = sourceLines[p.line];
            const text =
              p.from !== undefined ? raw.slice(p.from, p.to) : raw;
            return `<span class="snippetLine">${highlightComments(text)}</span>`;
          })
          .join("");
      }

      function makeExportNode(parts, sourceLines, pageMarginPx) {
        const wrap = document.createElement("div");
        wrap.style.background = "#fafbfc";
        wrap.style.padding = `${pageMarginPx}px 0`;
        wrap.style.display = "inline-block";
        const clone = capture.cloneNode(false);
        clone.removeAttribute("id");
        clone.className = capture.className;
        clone.style.width = `${capture.offsetWidth}px`;
        clone.style.boxSizing = "border-box";
        const pre = document.createElement("pre");
        pre.className = previewCode.className;
        if (previewCode.style.fontSize) {
          pre.style.fontSize = previewCode.style.fontSize;
        }
        pre.innerHTML = htmlForParts(parts, sourceLines);
        clone.appendChild(pre);
        wrap.appendChild(clone);
        const shell = document.createElement("div");
        shell.style.cssText =
          "position:fixed;left:-10000px;top:0;pointer-events:none;";
        shell.appendChild(wrap);
        document.body.appendChild(shell);
        return { shell, node: wrap };
      }

      async function exportPng() {
        try {
          const base = safeBaseFileName();
          const scale = Math.max(1, Math.min(16, Number(pngScale.value) || 4));
          pngScale.value = String(scale);
          const shouldSplit = !!splitA4.checked;
          if (!shouldSplit) {
            const dataUrl = await window.htmlToImage.toPng(capture, {
              backgroundColor: "#fafbfc",
              pixelRatio: scale,
              cacheBust: true,
            });
            triggerDownload(dataUrl, `${base}.png`);
            status.textContent = `Exported ${base}.png (${scale}x resolution).`;
            return;
          }

          render();

          const w = capture.offsetWidth;
          const a4HeightPx = Math.max(1, (w * 29.7) / 21);
          const pageMarginPx = Math.max(8, Math.round((w * 0.6) / 21));
          const budgetPx = Math.max(1, a4HeightPx - pageMarginPx * 2);

          const sourceLines = String(codeInput.value || "").split("\n");
          const spans = [...previewCode.querySelectorAll(".snippetLine")];
          if (spans.length !== sourceLines.length) {
            render();
          }
          const spans2 = [...previewCode.querySelectorAll(".snippetLine")];
          if (spans2.length !== sourceLines.length) {
            throw new Error("Preview line count mismatch; try Render again.");
          }

          const tasks = buildSplitTasks(spans2, sourceLines, budgetPx);
          if (tasks.length === 1) {
            const { shell, node } = makeExportNode(
              tasks[0],
              sourceLines,
              pageMarginPx
            );
            try {
              const dataUrl = await window.htmlToImage.toPng(node, {
                backgroundColor: "#fafbfc",
                pixelRatio: scale,
                cacheBust: true,
              });
              triggerDownload(dataUrl, `${base}.png`);
              status.textContent = `Exported ${base}.png (fits one A4 page).`;
            } finally {
              shell.remove();
            }
            return;
          }

          for (let p = 0; p < tasks.length; p += 1) {
            const { shell, node } = makeExportNode(
              tasks[p],
              sourceLines,
              pageMarginPx
            );
            try {
              const dataUrl = await window.htmlToImage.toPng(node, {
                backgroundColor: "#fafbfc",
                pixelRatio: scale,
                cacheBust: true,
              });
              triggerDownload(dataUrl, `${base}-p${p + 1}.png`);
            } finally {
              shell.remove();
            }
          }
          status.textContent = `Exported ${tasks.length} PNG files (${base}-p1 ... ${base}-p${tasks.length}) — breaks at line boundaries.`;
        } catch (e) {
          console.error(e);
          status.textContent = `Export failed: ${e.message || String(e)}`;
        }
      }

      renderBtn.addEventListener("click", render);
      downloadBtn.addEventListener("click", exportPng);
      codeInput.addEventListener("input", render);
      fontSize.addEventListener("input", render);
      wrapMode.addEventListener("change", render);
      render();
    </script>
  </body>
</html>
