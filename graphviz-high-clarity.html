<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Graphviz High Clarity Export</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .gvLayout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .gvEditor {
        min-height: 520px;
        width: 100%;
        resize: vertical;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px;
        background: rgba(0, 0, 0, 0.26);
        color: var(--text);
        font-family: var(--mono);
        line-height: 1.4;
      }
      .gvPreview {
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 520px;
        background: rgba(0, 0, 0, 0.14);
        overflow: auto;
      }
      .gvPreview svg {
        display: block;
        margin: 0 auto;
        max-width: none;
      }
      .gvActions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .gvControl {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .gvControl input,
      .gvControl select {
        width: 160px;
        padding: 9px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        color: var(--text);
      }
      .gvControl--small input {
        width: 88px;
      }

      @media (max-width: 980px) {
        .gvLayout {
          grid-template-columns: 1fr;
        }
      }

      .statusDetails {
        margin-top: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--mono);
        color: rgba(230, 237, 246, 0.92);
        background: rgba(255, 93, 143, 0.08);
        border: 1px solid rgba(255, 93, 143, 0.25);
        padding: 10px 12px;
        border-radius: 10px;
        max-height: 220px;
        overflow: auto;
      }

      .gvErrorBox {
        padding: 18px;
        color: rgba(230, 237, 246, 0.95);
      }
      .gvErrorBox__title {
        font-weight: 700;
        margin-bottom: 10px;
      }
      .gvErrorBox__pre {
        font-family: var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(255, 93, 143, 0.08);
        border: 1px solid rgba(255, 93, 143, 0.25);
        padding: 10px 12px;
        border-radius: 10px;
        margin: 0;
        max-height: 520px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__title">Graphviz High Clarity Export</div>
        <div class="topbar__actions">
          <a class="btn" href="./index.html">Back to menu</a>
          <a class="btn" href="./packer.html">Open packer</a>
        </div>
      </header>

      <main class="main" style="grid-template-columns: 1fr">
        <section class="panel">
          <div class="panel__title">Editor and Preview</div>
          <div class="gvActions" style="margin-bottom: 10px">
            <button id="renderBtn" class="btn btn--primary" type="button">
              Render
            </button>
            <button id="svgBtn" class="btn" type="button">Export SVG</button>
            <button id="pngBtn" class="btn" type="button">Export PNG</button>
            <button id="folderBtn" class="btn" type="button">
              Select Download Folder
            </button>
            <label class="gvControl">
              <span class="setting__label">File name</span>
              <input id="fileName" type="text" value="graph" />
            </label>
            <label class="gvControl gvControl--small">
              <span class="setting__label">PNG scale</span>
              <input
                id="pngScale"
                type="number"
                min="1"
                max="16"
                step="1"
                value="4"
              />
            </label>
            <label class="gvControl">
              <span class="setting__label">Engine</span>
              <select id="engine">
                <option value="dot" selected>dot</option>
                <option value="neato">neato</option>
                <option value="fdp">fdp</option>
                <option value="sfdp">sfdp</option>
                <option value="twopi">twopi</option>
                <option value="circo">circo</option>
              </select>
            </label>
          </div>
          <div class="gvLayout">
            <textarea id="dotInput" class="gvEditor" spellcheck="false">
digraph G {
  rankdir=LR;
  node [shape=box, fontname="Montserrat", style="rounded,filled", fillcolor="#0f1620", color="#4cc9f0", fontcolor="#e6edf6"];
  edge [color="#80ffdb", fontname="Montserrat", fontcolor="#9bb0c7"];

  User -> "Web App" [label="login"];
  "Web App" -> API [label="POST /login"];
  API -> DB [label="validate"];
  DB -> API [label="ok"];
  API -> "Web App" [label="JWT"];
}</textarea
            >
            <div id="preview" class="gvPreview"></div>
          </div>
          <div class="panel__footer">
            <div id="status" class="status">
              Tip: SVG export is always the sharpest. PNG export uses your
              selected scale.
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/viz.js@2.1.2/viz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/viz.js@2.1.2/full.render.js"></script>
    <script>
      const renderBtn = document.getElementById("renderBtn");
      const svgBtn = document.getElementById("svgBtn");
      const pngBtn = document.getElementById("pngBtn");
      const folderBtn = document.getElementById("folderBtn");
      const fileName = document.getElementById("fileName");
      const pngScale = document.getElementById("pngScale");
      const engine = document.getElementById("engine");
      const dotInput = document.getElementById("dotInput");
      const preview = document.getElementById("preview");
      const status = document.getElementById("status");
      let downloadDirHandle = null;
      let viz = null;

      function setStatus(summary, details) {
        status.innerHTML = "";
        const summaryEl = document.createElement("div");
        summaryEl.textContent = summary;
        status.appendChild(summaryEl);
        if (details) {
          const pre = document.createElement("pre");
          pre.className = "statusDetails";
          pre.textContent = details;
          status.appendChild(pre);
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function safeSlice(text, maxChars) {
        const s = String(text ?? "");
        if (s.length <= maxChars) return s;
        return s.slice(0, maxChars) + "\n...[truncated]";
      }

      function stripHtmlToText(html) {
        const raw = String(html ?? "");
        if (!raw.trim()) return "";
        try {
          const doc = new DOMParser().parseFromString(raw, "text/html");
          const t =
            doc.body?.innerText ||
            doc.documentElement?.textContent ||
            "";
          return t.replace(/\s+/g, " ").trim();
        } catch {
          return raw
            .replace(/<[^>]+>/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        }
      }

      function responseLooksLikeHtml(text) {
        const s = String(text ?? "").trimStart().slice(0, 400).toLowerCase();
        return (
          s.startsWith("<!doctype") ||
          s.startsWith("<html") ||
          (s.startsWith("<") && /<\/(html|body|head)\b/i.test(String(text ?? "")))
        );
      }

      /** Pull readable lines from SVG (Graphviz can embed errors or diagnostics in <text>). */
      function extractGraphvizErrorSummaryFromSvg(svgText) {
        const raw = String(svgText ?? "");
        if (!/<svg\b/i.test(raw)) return "";

        let doc;
        try {
          doc = new DOMParser().parseFromString(raw, "image/svg+xml");
          const pe = doc.querySelector("parsererror");
          if (pe && pe.textContent?.trim()) {
            return pe.textContent.trim().slice(0, 800);
          }
        } catch {
          return "";
        }

        const textEls = Array.from(doc.querySelectorAll("text"));
        const texts = textEls
          .map((el) => (el.textContent || "").replace(/\s+/g, " ").trim())
          .filter((t) => t && t !== "\u00a0");

        const blob = texts.join(" ");

        const patterns = [
          /syntax error[^\n.]{0,500}/i,
          /Parse error[^\n.]{0,500}/i,
          /Error:\s*[^\n.]{0,600}/i,
          /error in line[^\n.]{0,400}/i,
          /Error in line[^\n.]{0,400}/i,
          /line \d+:[^\n.]{0,500}/i,
          /cannot find[^\n.]{0,400}/i,
          /Unknown node[^\n.]{0,400}/i,
          /undefined node[^\n.]{0,400}/i,
          /badly delimited[^\n.]{0,400}/i,
          /Unexpected [^\n.]{0,400}/i,
          /Invalid [^\n.]{0,400}/i,
        ];
        for (const re of patterns) {
          const m = blob.match(re);
          if (m) return m[0].trim().slice(0, 900);
        }

        const redTexts = textEls
          .filter((el) => {
            const fill = (el.getAttribute("fill") || "").toLowerCase();
            return (
              fill === "#ff0000" ||
              fill === "#f00" ||
              fill === "red" ||
              /^#f{1,2}0{4,6}$/i.test(fill)
            );
          })
          .map((el) => el.textContent.trim())
          .filter(Boolean);
        if (redTexts.length) {
          return redTexts.join(" — ").slice(0, 900);
        }

        const lineRef = blob.match(/line\s+(\d+)/i);
        if (lineRef) {
          const n = lineRef[1];
          const idx = texts.findIndex((t) => /line\s+\d+/i.test(t));
          if (idx >= 0) {
            const tail = texts.slice(idx, idx + 12).join(" | ");
            return `Near line ${n}. ${tail.slice(0, 850)}${tail.length > 850 ? "…" : ""}`;
          }
          return `Graphviz references line ${n} (see preview if shown).`;
        }

        return blob.replace(/\s+/g, " ").trim().slice(0, 700);
      }

      function shortenUrlForDisplay(url) {
        const s = String(url ?? "");
        if (s.length <= 120) return s;
        try {
          const u = new URL(s);
          const enc = u.pathname.split("/").pop() || "";
          const head = `${u.origin}${u.pathname.slice(0, u.pathname.lastIndexOf("/") + 1)}`;
          return `${head}${enc.slice(0, 40)}…${enc.length > 40 ? ` (${enc.length} chars)` : ""}`;
        } catch {
          return s.slice(0, 120) + "…";
        }
      }

      /** Collapse noisy viz.js / Graphviz multi-line messages into a single readable block. */
      function normalizeGraphvizErrorMessage(msg) {
        let s = String(msg ?? "").trim();
        if (!s) return "";
        s = s.replace(/^(Error:\s*)+/i, "");
        const lines = s
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter(Boolean);
        const joined = lines.join("\n");
        return joined.length > 2000 ? joined.slice(0, 2000) + "…" : joined;
      }

      function humanizeErrorPayload(text) {
        const raw = String(text ?? "");
        if (!raw.trim()) return "";
        if (/<svg\b/i.test(raw)) {
          const s = extractGraphvizErrorSummaryFromSvg(raw);
          return s || "(SVG response — could not extract a short summary)";
        }
        if (responseLooksLikeHtml(raw)) {
          const plain = stripHtmlToText(raw);
          return plain || "(HTML with no extractable text)";
        }
        return raw.trim();
      }

      /** DOT/graphviz parse errors already say what is wrong; viz.js stack is only noise. */
      function isGraphvizParseLikeMessage(msg) {
        const m = String(msg ?? "").trim();
        return /syntax error in line|parse error|unknown node|badly delimited|unexpected|invalid/i.test(
          m,
        );
      }

      function sanitizeErrorStackForDisplay(stack, message) {
        if (!stack || typeof stack !== "string") return "";
        const msg = String(message ?? "").trim();
        if (msg && isGraphvizParseLikeMessage(msg)) return "";

        const lines = stack.split(/\r?\n/);
        const kept = [];
        for (const rawLine of lines) {
          const line = rawLine.trimEnd();
          if (!line.trim()) continue;
          if (/cdn\.jsdelivr\.net|\/viz\.js|full\.render\.js/i.test(line)) continue;
          if (/^\s*at\s+.*(?:viz\.js|full\.render\.js)/i.test(line)) continue;
          if (/^\s*at\s+new Promise\b/i.test(line)) continue;
          if (/^\s*at\s+ModuleWrapper\.render\b/i.test(line)) continue;
          kept.push(line);
        }
        if (kept.length === 0) return "";

        const out = [];
        for (let i = 0; i < kept.length; i++) {
          const line = kept[i];
          if (i === 0 && msg) {
            const withoutPrefix = line.replace(/^\s*Error:\s*/i, "").trim();
            if (withoutPrefix === msg || line === `Error: ${msg}`) continue;
          }
          out.push(line);
        }
        return out.join("\n").trim();
      }

      /** Compare after stripping repeated "Error:" prefixes (viz.js vs our wrapper). */
      function sameUnderlyingErrorMessage(a, b) {
        let x = String(a ?? "").trim().replace(/\s+/g, " ");
        let y = String(b ?? "").trim().replace(/\s+/g, " ");
        for (let i = 0; i < 3; i++) {
          const nx = x.replace(/^Error:\s*/i, "").trim();
          const ny = y.replace(/^Error:\s*/i, "").trim();
          if (nx === x && ny === y) break;
          x = nx;
          y = ny;
        }
        return x === y;
      }

      function stringifyErrorDetails(err) {
        if (err == null) return "Unknown error (null/undefined).";
        if (typeof err === "string") return err;
        if (err instanceof Error) {
          const parts = [];
          parts.push(`Name: ${err.name || "Error"}`);
          parts.push(`Message: ${err.message || "(empty message)"}`);
          if (err.url) parts.push(`URL: ${shortenUrlForDisplay(err.url)}`);
          if (err.snippet) {
            const sn = humanizeErrorPayload(err.snippet);
            parts.push(`Response snippet:\n${safeSlice(sn, 2000)}`);
          }
          const stackDisp = sanitizeErrorStackForDisplay(err.stack, err.message);
          if (stackDisp) parts.push(`Stack:\n${stackDisp}`);
          if (err.cause) {
            const c = err.cause;
            const dup =
              c instanceof Error &&
              sameUnderlyingErrorMessage(c.message, err.message);
            if (!dup) {
              parts.push(`Cause:\n${stringifyErrorDetails(err.cause)}`);
            }
          }
          return parts.join("\n");
        }
        try {
          return `Thrown value: ${JSON.stringify(err, null, 2)}`;
        } catch {
          return `Thrown value (unserializable): ${String(err)}`;
        }
      }

      function ensureVizReady() {
        if (viz) return;
        if (!window.Viz) {
          throw new Error(
            "Graphviz renderer failed to load (viz.js). Check network connectivity to cdn.jsdelivr.net.",
          );
        }
        viz = new window.Viz({ workerURL: undefined });
      }

      function safeBaseFileName() {
        const raw = String(fileName.value || "").trim();
        const cleaned = raw
          .replace(/[<>:"/\\|?*\x00-\x1f]/g, "-")
          .replace(/\.+$/g, "")
          .trim();
        const base = cleaned || "graph";
        fileName.value = base;
        return base;
      }

      function downloadBlob(blob, filename) {
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(u), 8000);
      }

      async function saveBlobToSelectedFolder(blob, filename) {
        if (!downloadDirHandle) return false;
        const fileHandle = await downloadDirHandle.getFileHandle(filename, {
          create: true,
        });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        return true;
      }

      function assertLooksLikeSvg(svgText, context) {
        if (!/<svg\b/i.test(svgText)) {
          const plain = humanizeErrorPayload(svgText);
          const hint = plain
            ? plain.slice(0, 800) + (plain.length > 800 ? "…" : "")
            : "The renderer output was not valid SVG.";
          const err = new Error(
            `Graphviz did not produce a diagram${context ? " (" + context + ")" : ""}. ${hint}`,
          );
          err.snippet = plain || safeSlice(svgText, 500);
          throw err;
        }
      }

      function renderErrorInPreview(err) {
        const details = stringifyErrorDetails(err);
        const safe = escapeHtml(details);
        preview.innerHTML = `
          <div class="gvErrorBox">
            <div class="gvErrorBox__title">Error</div>
            <pre class="gvErrorBox__pre">${safe}</pre>
          </div>
        `;
      }

      async function renderToSvgText() {
        const src = String(dotInput.value || "").trim();
        if (!src) throw new Error("DOT text is empty.");
        ensureVizReady();
        const eng = String(engine.value || "dot");
        try {
          const svgText = await viz.renderString(src, {
            format: "svg",
            engine: eng,
          });
          assertLooksLikeSvg(svgText, "");
          return svgText;
        } catch (e) {
          // viz.js can become unusable after a render error; recreate it.
          viz = null;
          const raw =
            e instanceof Error
              ? e.message
              : typeof e === "string"
                ? e
                : e != null
                  ? String(e)
                  : "";
          const normalized = normalizeGraphvizErrorMessage(raw);
          const err = new Error(
            normalized.trim() ||
              raw.trim() ||
              "Failed to render Graphviz (unknown error).",
          );
          throw err;
        }
      }

      async function renderPreview() {
        try {
          const svgText = await renderToSvgText();
          preview.innerHTML = svgText;
          setStatus("Rendered successfully.");
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `Render failed: ${e.message}`
              : `Render failed.`;
          setStatus(summary, details);
        }
      }

      async function exportSvg() {
        try {
          const svgText = await renderToSvgText();
          const svgBlob = new Blob([svgText], {
            type: "image/svg+xml;charset=utf-8",
          });
          const base = safeBaseFileName();
          const filename = `${base}.svg`;
          const saved = await saveBlobToSelectedFolder(svgBlob, filename);
          if (saved) setStatus(`SVG saved to selected folder as ${filename}.`);
          else {
            downloadBlob(svgBlob, filename);
            setStatus("SVG downloaded (vector, best clarity).");
          }
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `SVG export failed: ${e.message}`
              : `SVG export failed.`;
          setStatus(summary, details);
        }
      }

      async function exportPng() {
        try {
          const base = safeBaseFileName();
          const scale = Math.max(1, Math.min(16, Number(pngScale.value) || 4));
          pngScale.value = String(scale);

          const svgText = await renderToSvgText();
          const svgBlob = new Blob([svgText], {
            type: "image/svg+xml;charset=utf-8",
          });
          const svgUrl = URL.createObjectURL(svgBlob);
          const img = new Image();

          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = (evt) => {
              const err = new Error(
                "Failed to rasterize SVG to PNG (image load error).",
              );
              err.snippet =
                extractGraphvizErrorSummaryFromSvg(svgText) ||
                safeSlice(svgText, 800);
              err.cause = evt;
              reject(err);
            };
            img.src = svgUrl;
          });

          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          if (!ctx) throw new Error("Canvas is not available.");

          ctx.setTransform(scale, 0, 0, scale, 0, 0);
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(svgUrl);

          const blob = await new Promise((resolve) =>
            canvas.toBlob(resolve, "image/png"),
          );
          if (!blob) throw new Error("Could not create PNG.");
          const filename = `${base}.png`;
          const saved = await saveBlobToSelectedFolder(blob, filename);
          if (saved) {
            setStatus(`PNG saved to selected folder as ${filename} (${scale}x).`);
          } else {
            downloadBlob(blob, filename);
            setStatus(`PNG downloaded at ${scale}x scale.`);
          }
        } catch (e) {
          console.error(e);
          renderErrorInPreview(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `PNG export failed: ${e.message}`
              : `PNG export failed.`;
          setStatus(summary, details);
        }
      }

      renderBtn.addEventListener("click", renderPreview);
      svgBtn.addEventListener("click", exportSvg);
      pngBtn.addEventListener("click", exportPng);
      folderBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            setStatus(
              "Folder picker unavailable in an insecure context.",
              "This feature requires a secure context. Use https:// or run on localhost (not a plain file:// path).",
            );
            return;
          }
          if (!window.showDirectoryPicker) {
            setStatus(
              "Folder picker is not supported in this browser.",
              "Use a Chromium-based browser (Microsoft Edge / Google Chrome). If you can't, exports will still download normally without choosing a folder.",
            );
            return;
          }
          downloadDirHandle = await window.showDirectoryPicker({
            mode: "readwrite",
          });
          const folderName =
            downloadDirHandle && downloadDirHandle.name
              ? downloadDirHandle.name
              : "selected folder";
          setStatus(`Download folder selected: ${folderName}`);
        } catch (e) {
          if (e && e.name === "AbortError") {
            setStatus("Folder selection canceled.");
            return;
          }
          console.error(e);
          const details = stringifyErrorDetails(e);
          const summary =
            e && typeof e === "object" && "message" in e && e.message
              ? `Folder selection failed: ${e.message}`
              : `Folder selection failed.`;
          setStatus(summary, details);
        }
      });

      // Ctrl/Cmd + Enter for quick render.
      dotInput.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          renderPreview();
        }
      });

      renderPreview();
    </script>
  </body>
</html>
