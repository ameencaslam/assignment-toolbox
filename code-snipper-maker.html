<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Code Snipper Maker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__left">
          <a class="brand" href="./index.html" aria-label="ASG home">ASG</a>
          <div class="topbar__title">Code Snipper Maker</div>
        </div>
        <div class="topbar__actions">
          <a class="btn btn--ghost" href="./index.html">Menu</a>
        </div>
      </header>

      <main class="main main--even">
        <section class="panel">
          <div class="panel__title">Input</div>
          <div class="snippetToolbar">
            <label class="snippetField">
              <span class="snippetLabel">File name</span>
              <input id="fileName" type="text" value="snippet" />
            </label>
            <label class="snippetField">
              <span class="snippetLabel">PNG scale</span>
              <input
                id="pngScale"
                type="number"
                min="1"
                max="16"
                step="1"
                value="4"
              />
            </label>
            <button id="renderBtn" class="btn" type="button">Render</button>
            <button id="downloadBtn" class="btn btn--primary" type="button">
              Export PNG
            </button>
          </div>
          <textarea id="codeInput" class="snippetEditor" spellcheck="false">#include &lt;stdio.h&gt;

// this is a comment
int main() {
  printf("Hello\n");
  /* block comment */
  return 0;
}</textarea>
        </section>

        <section class="panel">
          <div class="panel__title">Preview</div>
          <div class="snippetPreviewWrap">
            <div id="capture">
              <pre id="previewCode"></pre>
            </div>
          </div>
          <div class="panel__footer">
            <div id="status" class="status">
              Monochrome snippet: black text, gray comments. Use PNG scale for
              export sharpness (same idea as diagram tools).
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
      const codeInput = document.getElementById("codeInput");
      const previewCode = document.getElementById("previewCode");
      const capture = document.getElementById("capture");
      const renderBtn = document.getElementById("renderBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const fileName = document.getElementById("fileName");
      const pngScale = document.getElementById("pngScale");
      const status = document.getElementById("status");

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function highlightComments(line) {
        const blockIdx = line.indexOf("/*");
        const slashIdx = line.indexOf("//");
        let commentStart = -1;
        if (blockIdx >= 0 && slashIdx >= 0) commentStart = Math.min(blockIdx, slashIdx);
        else commentStart = Math.max(blockIdx, slashIdx);
        if (commentStart < 0) return esc(line);
        const before = esc(line.slice(0, commentStart));
        const comment = esc(line.slice(commentStart));
        return `${before}<span class="comment">${comment}</span>`;
      }

      function safeBaseFileName() {
        const raw = String(fileName.value || "").trim();
        const cleaned = raw
          .replace(/[<>:"/\\|?*\x00-\x1f]/g, "-")
          .replace(/\.+$/g, "")
          .trim();
        const base = cleaned || "snippet";
        fileName.value = base;
        return base;
      }

      function render() {
        const code = String(codeInput.value || "");
        previewCode.innerHTML = code.split("\n").map(highlightComments).join("\n");
        status.textContent = "Rendered.";
      }

      async function exportPng() {
        try {
          const base = safeBaseFileName();
          const scale = Math.max(1, Math.min(16, Number(pngScale.value) || 4));
          pngScale.value = String(scale);
          const dataUrl = await window.htmlToImage.toPng(capture, {
            backgroundColor: "#fafbfc",
            pixelRatio: scale,
            cacheBust: true,
          });
          const a = document.createElement("a");
          a.href = dataUrl;
          a.download = `${base}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          status.textContent = `Exported ${base}.png (${scale}x resolution).`;
        } catch (e) {
          console.error(e);
          status.textContent = `Export failed: ${e.message || String(e)}`;
        }
      }

      renderBtn.addEventListener("click", render);
      downloadBtn.addEventListener("click", exportPng);
      codeInput.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
